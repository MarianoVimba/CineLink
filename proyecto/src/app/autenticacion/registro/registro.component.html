<body>
  <section class="registro-section">   
      <fieldset class="registro">

      <legend>Registro de Nuevo Usuario</legend>
    
      <div class="nombre">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" [(ngModel)]="nuevoUsuario.nombre" required [ngModelOptions]="{standalone: true}">
      </div>
      
      <div class="apellido">
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" placeholder="Ingresa tu apellido" [(ngModel)]="nuevoUsuario.apellido" required  [ngModelOptions]="{standalone: true}">
      </div>
      
      <div class="nombreUsuario">
        <label for="nombreUsuario">Nombre de usuario:</label>
        <input type="text" id="nombreUsuario" name="nombreUsuario" placeholder="Elige un nombre de usuario" [(ngModel)]="nuevoUsuario.nombreUsuario" required  [ngModelOptions]="{standalone: true}">
      </div>
      
      <div class="contraseña">
        <label for="contrasena">Contraseña:</label>
        <input type="password" id="contrasena" name="contrasena" placeholder="Crea una contraseña" [(ngModel)]="nuevoUsuario.password" required  [ngModelOptions]="{standalone: true}">
      </div>

      <div *ngIf="!verificarCantidadDeCaracteres()">
        <p>Contraseña corta minimo 8 caracteres</p>
      </div>
      
      <div class="confirmarContraseña">
        <label for="confirmarContrasena">Confirmación de contraseña:</label>
        <input type="password" id="confirmarContrasena" name="confirmarContrasena" placeholder="Repite la contraseña"[(ngModel)]="nuevoUsuario.confirmacionPasword" required  [ngModelOptions]="{standalone: true}">
      </div>

      <div *ngIf="!verificarPassword()">
        <p>Las contraseñas no coinciden</p>
      </div>
      
      <div class="pais">
        <label for="pais">País:</label>
        <input type="text" id="pais" name="pais" placeholder="Ingresa tu país" [(ngModel)]="nuevoUsuario.pais" required  [ngModelOptions]="{standalone: true}">
      </div>
      
      <div class="ciudad">
        <label for="ciudad">Ciudad:</label>
        <input type="text" id="ciudad" name="ciudad" placeholder="Ingresa tu ciudad" [(ngModel)]="nuevoUsuario.ciudad" required  [ngModelOptions]="{standalone: true}">
      </div>
      
      <div class="descripcion">
        <label for="descripcion">Descripción (opcional):</label>
        <textarea id="descripcion" name="descripcion" [(ngModel)]="nuevoUsuario.descripcion" placeholder="Cuéntanos sobre vos"  [ngModelOptions]="{standalone: true}"></textarea>
      </div>
      
      <div class="boton">
        <button type="submit" (click)="addUsuario()">Confirmar</button>
      </div>
      
    </fieldset>
  
  </section>
</body>
